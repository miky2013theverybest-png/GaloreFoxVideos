<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=ù, initial-scale=1.0">
    <title>Video - GFV</title>
    <link rel="icon" type="image/png" href="immagini/Innovation_GFC_v2.png5">
    <style>
                   body {
                background-color: rgb(36, 36, 36);
                color: white;
                margin: 0px;
                padding: 0px;
                font-family: Arial;
            }

            .testata {
                text-align: center;
                background-color: rgb(0, 0, 111);
                margin: 0px;
                padding: 25px;
            }

            .h4 {
                margin: 0px;
            }

            .img-test {
                width: 70%;
                margin: 20px auto;
                display: block;
            }

            .corpo {
                padding: 25px;
            }

            #backToTop {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    font-size: 18px;
    background-color: #333;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: none;
    opacity: 0.8;
    transition: 0.3s;
}

#backToTop:hover {
    opacity: 1;
}

.uno {
    display: none;
}

.due {
    display: none;
}

.tre {
    display: none;
}

.quattro {
    display: none;
}

    </style>
</head>
<body>
     <div> <!-- TUTTA LA PAGINA -->
        <div class="testata"> <!-- TESTATA-->
            <img src="immagini/minecraft_title.png" alt="" class="img-test">
            <a href="index.html">ritorna a casa!</a> <h5>oppure</h5>
            <input type="text" id="searchBar" placeholder="Cerca un video..." />
        </div>
        <div class="corpo"> <!-- CORPO -->
            <div class="descrizione">
                <div class="la survivle1 episodio 1 video">
                    <h4>LaSurvivle - Ep. 1</h4>
                    <img width="500px" height="300px" src="miniature/LaSurvivle - Ep. 1-Copertina.jpg" onclick="PlayVideo(this)">
                    <iframe class="quattro" width="500px" height="300px" src="https://drive.google.com/file/d/1qKycn-50UZDDu-rwQlDViefIRDSHR2lW/preview?autoplay=1" allow="autoplay" frameborder="0"></iframe>
                    <hr>
                </div>
                 <div class="minecraft con le tnt video">
                    <h4>Minecraft con le tnt!</h4>
                     <img width="500px" height="300px" src="miniature/Minecraft con le tnt!-Copertina.jpg" onclick="PlayVideo(this)">
                    <iframe class="tre" width="500px" height="300px" src="https://drive.google.com/file/d/177Uol-ijPHXOjWtp7TwfiR6yoh4nfEYV/preview?autoplay=1" allow="autoplay" frameborder="0"></iframe>
                    <hr>
                </div>
                <div class="le bedwars video">
                    <h4>Le bedwars!</h4>
                    <img width="500px" height="300px" src="miniature/bedwars.jpg" onclick="PlayVideo(this)">
                    <iframe class="due" width="500px" height="300px" src="https://drive.google.com/file/d/1L4dx7tGEOy0L1A3mOljjQ7eN_EVJrZZh/preview" frameborder="0"></iframe>
                    <hr>
                </div>
                <div class="il mio primo video">
                    <h4>Il mio primo video!</h4>
                    <img width="500px" height="300px" src="miniature/il mio primo video.jpg" onclick="PlayVideo(this)">
                    <iframe class="uno" width="500px" height="300px" src="https://drive.google.com/file/d/1Jm_qMMYIMs4c9SoH53mD0jOB0JMvBjZZ/preview" frameborder="0"></iframe>
                    <hr>
                </div>
                
               
    </div>
    <script>
document.getElementById("searchBar").addEventListener("keyup", function() {
    let input = this.value.toLowerCase();
    let videos = document.getElementsByClassName("video");

    for (let i = 0; i < videos.length; i++) {
        let text = videos[i].innerText.toLowerCase();
        if (text.includes(input)) {
            videos[i].style.display = "";
        } else {
            videos[i].style.display = "none";
        }
    }
});
</script>
    <button id="backToTop">↑ Torna su</button>
    <script>
let btn = document.getElementById("backToTop");

window.addEventListener("scroll", function() {
    if (window.scrollY > 300) {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
});

btn.addEventListener("click", function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});
</script>
<script>
function PlayVideo(img) {
    img.style.display = "none";                // nasconde la miniatura
    img.nextElementSibling.style.display = "block"; // mostra l'iframe
}
</script>


</body>
</html>
